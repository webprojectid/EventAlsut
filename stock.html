<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Binus Alsut · Stock Opname</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ============================================================ -->
    <!-- PREVENT FLASH: Cek session SEBELUM render -->
    <!-- ============================================================ -->
    <script>
        (function() {
            try {
                const USER_DB_KEY = 'binus_users_db';
                const saved = localStorage.getItem('binus_current_session');
                if (saved && saved !== "undefined") {
                    const u = JSON.parse(saved);
                    if (u && u.role) {
                        window.__SESSION_VALID = true;
                        window.__SESSION_USER = u;
                    }
                }
            } catch (e) {}
        })();
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: 'var(--brand-bg)',
                            surface: 'var(--brand-surface)',
                            card: 'var(--brand-card)',
                            border: 'var(--brand-border)',
                            primary: 'var(--brand-primary)',
                            primaryLight: 'var(--brand-primary-light)',
                            secondary: 'var(--brand-secondary)',
                            accent: 'var(--brand-accent)',
                            mint: 'var(--brand-mint)',
                            muted: 'var(--brand-muted)',
                            text: 'var(--brand-text)'
                        },
                        status: {
                            info: { text: 'var(--status-info-text)', bg: 'var(--status-info-bg)', border: 'var(--status-info-border)' },
                            success: { text: 'var(--status-success-text)', bg: 'var(--status-success-bg)', border: 'var(--status-success-border)' },
                            warn: { text: 'var(--status-warn-text)', bg: 'var(--status-warn-bg)', border: 'var(--status-warn-border)' },
                            danger: { text: 'var(--status-danger-text)', bg: 'var(--status-danger-bg)', border: 'var(--status-danger-border)' },
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.4s ease forwards',
                        'scale-in': 'scaleIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'pulse-dot': 'pulseDot 1.6s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        scaleIn: { '0%': { opacity: '0', transform: 'scale(0.92)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
                        pulseDot: { '0%,100%': { transform: 'scale(0.92)', opacity: '0.7' }, '50%': { transform: 'scale(1.2)', opacity: '1' } },
                        float: { '0%,100%': { transform: 'translateY(0px)' }, '50%': { transform: 'translateY(-8px)' } },
                    }
                }
            }
        }
    </script>
    <style>
        :root,
        [data-theme="light"] {
            color-scheme: light;
            --brand-bg: #F4F6FC;
            --brand-surface: #FFFFFF;
            --brand-card: #FFFFFF;
            --brand-border: #E1E5F5;
            --brand-primary: #10B981; /* Aksen warna Emerald Green untuk Stock Opname */
            --brand-primary-light: #6EE7B7;
            --brand-secondary: #059669;
            --brand-accent: #047857;
            --brand-mint: #34D399;
            --brand-muted: #64748B;
            --brand-text: #1E1B3A;

            --glass-bg: rgba(255, 255, 255, 0.72);
            --input-bg: rgba(255, 255, 255, 0.92);
            --table-header-bg: #F0F2FC;

            --card-glass-bg: linear-gradient(165deg, rgba(255, 255, 255, 0.68) 0%, rgba(255, 255, 255, 0.42) 100%);
            --card-glass-border: rgba(255, 255, 255, 0.55);
            --card-glass-border-soft: rgba(16, 185, 129, 0.10);
            --card-glass-shadow: rgba(31, 41, 119, 0.14);
            --card-glass-highlight: rgba(255, 255, 255, 0.85);
            --card-glass-rim-dim: rgba(16, 185, 129, 0.12);
            --card-glass-blur: 26px;
            --card-glass-sat: 180%;

            --brand-glow: rgba(16, 185, 129, 0.12);
            --brand-glow-strong: rgba(16, 185, 129, 0.28);

            --aurora-1: rgba(16, 185, 129, 0.30);
            --aurora-2: rgba(59, 130, 246, 0.24);
            --aurora-3: rgba(16, 185, 129, 0.22);
            --aurora-4: rgba(6, 182, 212, 0.14);

            --status-info-text: #0369A1; --status-info-bg: rgba(14, 165, 233, 0.13); --status-info-border: rgba(14, 165, 233, 0.35);
            --status-success-text: #047857; --status-success-bg: rgba(16, 185, 129, 0.13); --status-success-border: rgba(16, 185, 129, 0.35);
            --status-warn-text: #B45309; --status-warn-bg: rgba(245, 158, 11, 0.15); --status-warn-border: rgba(245, 158, 11, 0.38);
            --status-danger-text: #BE123C; --status-danger-bg: rgba(244, 63, 94, 0.13); --status-danger-border: rgba(244, 63, 94, 0.35);

            --form-bg: #FFFFFF;
            --form-text: #1E1B3A;
            --form-border: #D1D5F0;
            --form-focus-border: #10B981;
            --form-focus-shadow: rgba(16, 185, 129, 0.25);
            
            --nav-active-bg: #10B981;
            --nav-active-text: #FFFFFF;
        }

        [data-theme="dark"] {
            color-scheme: dark;
            --brand-bg: #0A0714;
            --brand-surface: #120D22;
            --brand-card: #171029;
            --brand-border: #271C42;
            --brand-primary: #34D399; /* Dark Mode Mint Green */
            --brand-primary-light: #6EE7B7;
            --brand-secondary: #059669;
            --brand-accent: #10B981;
            --brand-mint: #A7F3D0;
            --brand-muted: #9893B8;
            --brand-text: #F4F2FF;

            --glass-bg: rgba(23, 16, 41, 0.62);
            --input-bg: rgba(8, 6, 16, 0.55);
            --table-header-bg: #1A1330;

            --card-glass-bg: linear-gradient(165deg, rgba(60, 48, 92, 0.50) 0%, rgba(23, 16, 41, 0.38) 100%);
            --card-glass-border: rgba(255, 255, 255, 0.10);
            --card-glass-border-soft: rgba(52, 211, 153, 0.16);
            --card-glass-shadow: rgba(0, 0, 0, 0.45);
            --card-glass-highlight: rgba(255, 255, 255, 0.14);
            --card-glass-rim-dim: rgba(0, 0, 0, 0.25);
            --card-glass-blur: 26px;
            --card-glass-sat: 180%;

            --brand-glow: rgba(52, 211, 153, 0.20);
            --brand-glow-strong: rgba(52, 211, 153, 0.40);

            --aurora-1: rgba(52, 211, 153, 0.45);
            --aurora-2: rgba(59, 130, 246, 0.30);
            --aurora-3: rgba(16, 185, 129, 0.35);
            --aurora-4: rgba(139, 92, 246, 0.20);

            --status-info-text: #38BDF8; --status-info-bg: rgba(14, 165, 233, 0.12); --status-info-border: rgba(14, 165, 233, 0.32);
            --status-success-text: #34D399; --status-success-bg: rgba(16, 185, 129, 0.12); --status-success-border: rgba(16, 185, 129, 0.32);
            --status-warn-text: #FBBF24; --status-warn-bg: rgba(245, 158, 11, 0.12); --status-warn-border: rgba(245, 158, 11, 0.32);
            --status-danger-text: #FB7185; --status-danger-bg: rgba(244, 63, 94, 0.12); --status-danger-border: rgba(244, 63, 94, 0.32);

            --form-bg: #1A1330;
            --form-text: #F4F2FF;
            --form-border: #342A54;
            --form-focus-border: #34D399;
            --form-focus-shadow: rgba(52, 211, 153, 0.35);
            
            --nav-active-bg: #34D399;
            --nav-active-text: #0A0714; /* Teks gelap di atas badge hijau terang */
        }

        * { box-sizing: border-box; }
        body {
            background: var(--brand-bg); color: var(--brand-text);
            font-family: 'Inter', sans-serif;
            transition: background 0.4s ease, color 0.4s ease;
            position: relative; min-height: 100vh;
        }

        #main-app { position: relative; z-index: 1; display: none; }
        #main-app.show { display: flex !important; }
        #login-page { z-index: 50; }
        #login-page.hidden-early { display: none !important; }
        .login-bg.hidden { display: none; }

        @keyframes auroraDrift {
            0% { background-position: 0% 0%, 100% 0%, 80% 100%, 0% 100%; }
            50% { background-position: 8% 6%, 92% 8%, 75% 92%, 8% 92%; }
            100% { background-position: 0% 10%, 100% 0%, 85% 100%, 0% 95%; }
        }

        .aurora-surface {
            background-image:
                radial-gradient(ellipse 45% 38% at 12% 15%, var(--aurora-1) 0%, transparent 60%),
                radial-gradient(ellipse 40% 36% at 90% 10%, var(--aurora-3) 0%, transparent 60%),
                radial-gradient(ellipse 42% 40% at 80% 92%, var(--aurora-2) 0%, transparent 58%),
                radial-gradient(ellipse 36% 34% at 12% 90%, var(--aurora-4) 0%, transparent 55%);
            background-size: 160% 160%; background-repeat: no-repeat;
            animation: auroraDrift 26s ease-in-out infinite alternate;
            transition: background-image 0.4s ease;
        }

        .glass {
            position: relative; background: var(--card-glass-bg);
            backdrop-filter: blur(var(--card-glass-blur)) saturate(var(--card-glass-sat));
            -webkit-backdrop-filter: blur(var(--card-glass-blur)) saturate(var(--card-glass-sat));
            border: 1px solid var(--card-glass-border);
            box-shadow: 0 8px 32px var(--card-glass-shadow), 0 1px 1px var(--card-glass-border-soft), inset 0 1px 0 var(--card-glass-highlight), inset 0 0 0 1px var(--card-glass-border-soft) !important;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.3s ease, transform 0.3s ease;
        }
        .glass::after {
            content: ''; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
            background: linear-gradient(135deg, var(--card-glass-highlight) 0%, transparent 32%, transparent 68%, var(--card-glass-rim-dim) 100%);
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; opacity: 0.9;
        }

        .header-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
        }

        .gradient-text {
            background: linear-gradient(120deg, var(--brand-primary) 0%, var(--brand-secondary) 35%, var(--brand-accent) 70%, var(--brand-primary) 100%);
            background-size: 300% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientShift 6s ease-in-out infinite;
        }
        @keyframes gradientShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .nav-btn {
            padding: 0.5rem 1rem; border-radius: 0.75rem; font-size: 0.875rem; font-weight: 600;
            color: var(--brand-muted); transition: all 0.25s ease; white-space: nowrap;
        }
        .nav-btn:hover { color: var(--brand-text); background: var(--brand-glow); }
        .nav-btn.active { color: var(--nav-active-text); background: var(--nav-active-bg); box-shadow: 0 4px 12px var(--brand-glow-strong); }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-secondary) 50%, var(--brand-primary) 100%);
            background-size: 200% auto; background-position: 0% 50%; transition: all 0.4s ease;
        }
        .btn-primary:hover { transform: translateY(-2px) scale(1.015); background-position: 100% 50%; box-shadow: 0 10px 32px var(--brand-glow-strong); }
        .btn-primary:active { transform: translateY(0) scale(0.99); }

        .input-modern {
            background: var(--form-bg); color: var(--form-text); border: 1px solid var(--form-border);
            transition: all 0.25s ease; border-radius: 0.75rem; padding: 0.625rem 1rem;
            font-weight: 500; font-size: 0.875rem; width: 100%; font-family: 'Inter', sans-serif;
        }
        .input-modern:focus { border-color: var(--form-focus-border); box-shadow: 0 0 0 3px var(--form-focus-shadow); outline: none; }

        .live-badge {
            display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.875rem 0.375rem 0.75rem;
            border-radius: 9999px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            background: rgba(220, 38, 38, 0.10); border: 1px solid rgba(220, 38, 38, 0.25); color: #DC2626;
            transition: all 0.3s ease; box-shadow: 0 0 12px rgba(220, 38, 38, 0.08); white-space: nowrap;
        }
        [data-theme="dark"] .live-badge { background: rgba(220, 38, 38, 0.14); border-color: rgba(220, 38, 38, 0.30); color: #F87171; box-shadow: 0 0 20px rgba(220, 38, 38, 0.10); }
        .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #DC2626; box-shadow: 0 0 6px rgba(220, 38, 38, 0.5); animation: pulseDot 1.6s ease-in-out infinite; flex-shrink: 0; }
        [data-theme="dark"] .live-dot { background: #F87171; box-shadow: 0 0 10px rgba(220, 38, 38, 0.6); }
        .live-text { animation: pulseLiveText 2.4s ease-in-out infinite; font-weight: 800; }
        @keyframes pulseLiveText { 0%, 100% { opacity: 0.85; } 50% { opacity: 1; } }

        .login-bg {
            position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
            background-color: var(--brand-bg);
            background-image:
                radial-gradient(ellipse 60% 50% at 20% 15%, var(--aurora-1) 0%, transparent 60%),
                radial-gradient(ellipse 55% 50% at 85% 25%, var(--aurora-3) 0%, transparent 60%),
                radial-gradient(ellipse 60% 55% at 75% 90%, var(--aurora-2) 0%, transparent 60%),
                radial-gradient(ellipse 50% 45% at 15% 90%, var(--aurora-4) 0%, transparent 60%);
            background-size: 160% 160%; background-repeat: no-repeat;
            animation: auroraDrift 30s ease-in-out infinite alternate; transition: background-color 0.4s ease;
        }
        .login-cursor-glow {
            position: absolute; inset: 0; background: radial-gradient(circle 420px at var(--cx, 50%) var(--cy, 38%), var(--aurora-1) 0%, transparent 70%);
            opacity: 0.7; pointer-events: none; transition: opacity 0.5s ease; mix-blend-mode: screen;
        }
        [data-theme="light"] .login-cursor-glow { mix-blend-mode: multiply; opacity: 0.5; }
        .login-orb { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.85; pointer-events: none; animation: float 8s ease-in-out infinite; }
        .login-orb-1 { width: 340px; height: 340px; top: -8%; left: -8%; background: var(--aurora-1); animation-duration: 9s; }
        .login-orb-2 { width: 300px; height: 300px; bottom: -10%; right: -6%; background: var(--aurora-3); animation-duration: 11s; animation-delay: -3s; }
        .login-orb-3 { width: 220px; height: 220px; bottom: 12%; left: 8%; background: var(--aurora-2); animation-duration: 7s; animation-delay: -1.5s; }
        .login-orb-4 { width: 180px; height: 180px; top: 12%; right: 12%; background: var(--aurora-4); animation-duration: 10s; animation-delay: -5s; }

        .login-card { animation: float 6s ease-in-out infinite; position: relative; z-index: 1; }
        .login-card-border { position: relative; isolation: isolate; }
        .login-card-border::before {
            content: ''; position: absolute; inset: -1.5px; border-radius: inherit; padding: 1.5px;
            background: conic-gradient(from var(--border-angle, 0deg), var(--brand-primary), var(--brand-accent), var(--brand-secondary), var(--brand-primary));
            -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude;
            animation: borderSpin 6s linear infinite; z-index: -1;
        }
        @property --border-angle { syntax: '<angle>'; inherits: false; initial-value: 0deg; }
        @keyframes borderSpin { to { --border-angle: 360deg; } }
        .login-logo {
            background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-secondary) 50%, var(--brand-accent) 100%);
            background-size: 200% 200%; animation: gradientShift 5s ease-in-out infinite;
        }

        .view-transition { animation: scaleIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .card-hover { transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
        .card-hover:hover {
            transform: translateY(-6px);
            border-color: var(--card-glass-highlight);
            box-shadow: 0 24px 60px var(--brand-glow-strong), inset 0 1px 0 var(--card-glass-highlight), inset 0 0 0 1px var(--card-glass-border-soft) !important;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--brand-muted); border-radius: 8px; opacity: 0.5; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand-primary); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>

    <!-- ============================================================ -->
    <!-- LOGIN PAGE -->
    <!-- ============================================================ -->
    <div id="login-page" class="login-bg px-4">
        <div class="login-cursor-glow" id="login-cursor-glow"></div>
        <div class="login-orb login-orb-1"></div>
        <div class="login-orb login-orb-2"></div>
        <div class="login-orb login-orb-3"></div>
        <div class="login-orb login-orb-4"></div>

        <div class="relative w-full max-w-md p-8 rounded-3xl glass login-card login-card-border shadow-2xl">
            <div class="text-center mb-8">
                <div class="login-logo inline-flex items-center justify-center w-16 h-16 rounded-2xl text-white text-2xl font-extrabold shadow-lg mb-4">AS</div>
                <h1 class="text-2xl font-extrabold tracking-tight gradient-text">Stock Opname</h1>
                <p class="text-sm text-brand-muted mt-1 font-medium">Binus Alam Sutera · Inventory Audit</p>
            </div>

            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
                <div id="login-error" class="hidden bg-status-danger-bg border border-status-danger-border text-status-danger-text text-sm p-3 rounded-xl text-center font-medium">
                    Username or password is incorrect
                </div>
                <div>
                    <label class="block text-xs font-semibold text-brand-muted uppercase tracking-wider mb-1.5">Username</label>
                    <input type="text" id="username" required class="w-full px-4 py-3.5 rounded-xl input-modern text-brand-text font-medium" placeholder="Enter username" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-brand-muted uppercase tracking-wider mb-1.5">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3.5 rounded-xl input-modern text-brand-text font-medium" placeholder="••••••••" />
                </div>
                <button type="submit" class="w-full py-3.5 mt-2 rounded-xl btn-primary text-white font-bold tracking-wide shadow-lg transition hover:opacity-90">
                    Sign In
                </button>
                <div class="flex items-center justify-center space-x-3 pt-3">
                    <button type="button" onclick="toggleTheme()" class="px-4 py-2 rounded-xl bg-brand-surface border border-brand-border text-xs font-bold text-brand-text transition hover:bg-brand-glow shadow-sm">
                        <span id="login-theme-text">Dark</span>
                    </button>
                    <button type="button" onclick="toggleLanguage()" class="px-4 py-2 rounded-xl bg-brand-surface border border-brand-border text-xs font-bold text-brand-text transition hover:bg-brand-glow shadow-sm">
                        <span id="login-lang-text">ENG</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- MAIN APP: STOCK OPNAME -->
    <!-- ============================================================ -->
    <div id="main-app" class="flex-col h-screen overflow-hidden bg-brand-bg aurora-surface">
        
        <!-- HEADER NAVBAR -->
        <header class="flex-none header-glass z-30 w-full sticky top-0 px-4 py-3 lg:px-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
                
                <!-- Kiri: Back Button, Logo & Title -->
                <div class="flex items-center justify-between md:justify-start gap-4">
                    <!-- Tombol Back ke Index -->
                    <a href="index.html" class="flex items-center justify-center w-9 h-9 rounded-xl bg-brand-surface border border-brand-border text-brand-text hover:bg-brand-glow hover:border-brand-primary transition shadow-sm group" title="Kembali ke Main Menu">
                        <svg class="text-brand-muted group-hover:text-brand-primary transition" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    </a>

                    <div class="flex items-center space-x-3 cursor-pointer" onclick="navigate('dashboard')">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-primary to-brand-accent flex items-center justify-center font-extrabold text-white shadow-lg">AS</div>
                        <div>
                            <h1 class="text-sm font-bold text-brand-text leading-tight">Stock Opname</h1>
                            <div class="flex items-center space-x-2 mt-0.5">
                                <span class="text-[10px] text-brand-muted uppercase tracking-wider hidden sm:inline-block">Inventory Audit</span>
                                <span class="text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border border-status-info-border text-status-info-text" id="user-role-badge">Role</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Mobile Badge -->
                    <div class="flex items-center gap-2 md:hidden">
                        <span class="live-badge scale-90 origin-right"><span class="live-dot"></span><span class="live-text">LIVE</span></span>
                    </div>
                </div>

                <!-- Tengah: Navigation Menu KHUSUS STOCK OPNAME -->
                <nav class="flex items-center overflow-x-auto no-scrollbar gap-1 py-1 md:py-0 w-full md:w-auto md:flex-1 md:justify-center">
                    <button onclick="navigate('dashboard')" id="nav-dashboard" class="nav-btn active">Dashboard</button>
                    <button onclick="navigate('periode')" id="nav-periode" class="nav-btn">Periode Audit</button>
                    <button onclick="navigate('input')" id="nav-input" class="nav-btn">Input Fisik</button>
                    <button onclick="navigate('selisih')" id="nav-selisih" class="nav-btn">Selisih Stok</button>
                    <button onclick="navigate('settings')" id="nav-settings" class="nav-btn admin-only">Pengaturan</button>
                </nav>

                <!-- Kanan: Controls & User -->
                <div class="flex items-center justify-end gap-2 flex-shrink-0 border-t border-brand-border md:border-0 pt-2 md:pt-0 mt-1 md:mt-0">
                    <span class="live-badge hidden md:inline-flex mr-2"><span class="live-dot"></span><span class="live-text">LIVE</span></span>
                    <span class="text-xs font-bold text-brand-text hidden lg:inline-block mr-2 truncate max-w-[100px]" id="user-display-name">User</span>
                    
                    <button onclick="toggleTheme()" class="px-3 py-1.5 text-xs font-bold rounded-lg border border-brand-border bg-brand-surface text-brand-text hover:bg-brand-glow transition shadow-sm">
                        <span id="theme-text">Dark</span>
                    </button>
                    <button onclick="toggleLanguage()" class="px-3 py-1.5 text-xs font-bold rounded-lg border border-brand-border bg-brand-surface text-brand-text hover:bg-brand-glow transition shadow-sm">
                        <span id="lang-text">ENG</span>
                    </button>
                    <button onclick="handleLogout()" class="px-3 py-1.5 text-xs font-bold rounded-lg border border-status-danger-border bg-status-danger-bg text-status-danger-text hover:opacity-80 transition shadow-sm flex items-center">
                        <span class="hidden sm:inline-block mr-1">Logout</span> ⤴
                    </button>
                </div>
            </div>
        </header>

        <!-- ============================================================ -->
        <!-- MAIN CONTENT AREA (LOCKED / COMING SOON) -->
        <!-- ============================================================ -->
        <main class="flex-1 overflow-y-auto relative w-full px-4 sm:px-6 md:px-8 py-10 pb-24 flex items-center justify-center">
            
            <div class="w-full max-w-2xl mx-auto view-transition text-center relative">
                
                <!-- Decorative background glow inside the container area -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-brand-primary mix-blend-screen filter blur-[100px] opacity-10 pointer-events-none"></div>

                <!-- The Locked Card -->
                <div class="glass rounded-[2rem] p-10 sm:p-16 shadow-2xl card-hover relative overflow-hidden">
                    
                    <div class="relative z-10">
                        <!-- Lock Icon dengan animasi float & pulse tipis -->
                        <span class="text-7xl sm:text-[6rem] block mb-8 filter drop-shadow-xl animate-float">🔒</span>
                        
                        <h2 class="text-2xl sm:text-3xl font-extrabold text-brand-text mb-4 tracking-tight">Modul Dalam Pengembangan</h2>
                        
                        <p class="text-brand-muted text-sm sm:text-base mb-8 leading-relaxed font-medium max-w-md mx-auto">
                            Segera hadir untuk membantu Anda melakukan pengecekan dan rekap stok barang.
                        </p>
                        
                        <!-- Badge Coming Soon -->
                        <div class="inline-flex items-center gap-2.5 px-6 py-3 rounded-full bg-brand-surface border border-brand-primary/40 text-xs font-extrabold text-brand-text shadow-lg backdrop-blur-md">
                            <span class="w-3 h-3 rounded-full bg-brand-primary animate-pulse shadow-[0_0_10px_var(--brand-primary)]"></span>
                            COMING SOON
                        </div>
                    </div>

                </div>
            </div>

        </main>
    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT — LOGIC DASAR -->
    <!-- ============================================================ -->
    <script>
        const USER_DB_KEY = 'binus_users_db';
        let currentUser = null;
        let currentLang = 'en';

        // Dictionary
        const translations = {
            en: { theme_dark: 'Dark', theme_light: 'Light', opt_viewer: 'View Only', opt_admin: 'Admin' },
            id: { theme_dark: 'Gelap', theme_light: 'Terang', opt_viewer: 'Hanya Lihat', opt_admin: 'Admin' }
        };
        function tk(key) { return translations[currentLang][key] || key; }

        // Cek/Load User Dummy
        let appUsers = [];
        try { appUsers = JSON.parse(localStorage.getItem(USER_DB_KEY)); if (!Array.isArray(appUsers)) throw new Error(); } catch (e) { appUsers = []; }
        if (!appUsers.find(u => u.username === 'sewong')) { appUsers.push({ username: 'sewong', password: '_pR0t3<s3<uR3', role: 'admin' }); localStorage.setItem(USER_DB_KEY, JSON.stringify(appUsers)); }

        // Cursor FX Login
        (function initLoginAuroraInteraction() {
            const stage = document.getElementById('login-page'); if (!stage) return;
            const orbs = stage.querySelectorAll('.login-orb'); const glow = document.getElementById('login-cursor-glow');
            const depths = [26, 34, 20, 30]; let rafId = null, px = 0.5, py = 0.38;

            function apply() {
                const nx = px - 0.5; const ny = py - 0.5;
                orbs.forEach((orb, i) => { const d = depths[i % depths.length]; orb.style.setProperty('--ox', (-nx * d).toFixed(1) + 'px'); orb.style.setProperty('--oy', (-ny * d).toFixed(1) + 'px'); });
                if (glow) { glow.style.setProperty('--cx', (px * 100).toFixed(1) + '%'); glow.style.setProperty('--cy', (py * 100).toFixed(1) + '%'); }
                rafId = null;
            }
            function onMove(clientX, clientY) {
                if (window.innerWidth <= 0 || window.innerHeight <= 0) return;
                px = clientX / window.innerWidth; py = clientY / window.innerHeight;
                if (!rafId) rafId = requestAnimationFrame(apply);
            }
            stage.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
            stage.addEventListener('touchmove', e => { if (e.touches[0]) onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        })();

        // Auth Logic
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value.trim();
            const valid = appUsers.find(user => user.username === u && user.password === p);
            if (valid) applyRole(valid);
            else document.getElementById('login-error').classList.remove('hidden');
        }

        function applyRole(userObj) {
            currentUser = userObj;
            localStorage.setItem('binus_current_session', JSON.stringify(userObj));
            const isAdm = userObj.role === 'admin';

            document.getElementById('user-display-name').innerText = userObj.username;
            const badge = document.getElementById('user-role-badge');
            badge.innerText = isAdm ? tk('opt_admin') : tk('opt_viewer');
            badge.className = isAdm ?
                'text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border border-status-success-border text-status-success-text' :
                'text-[9px] font-bold uppercase tracking-widest px-2 py-0.5 rounded border border-status-info-border text-status-info-text';

            document.querySelectorAll('.admin-only').forEach(el => el.style.display = isAdm ? '' : 'none');

            document.getElementById('login-page').classList.add('hidden', 'hidden-early');
            document.getElementById('main-app').classList.add('show');
        }

        // Return ke Main Menu index.html jika Logout
        function handleLogout() {
            localStorage.removeItem('binus_current_session');
            currentUser = null;
            window.location.href = 'index.html'; 
        }

        // Theme & Lang
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = (html.getAttribute('data-theme') || 'light') === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            html.style.colorScheme = newTheme;
            const themeLabel = newTheme === 'dark' ? tk('theme_dark') : tk('theme_light');
            document.getElementById('theme-text').innerText = themeLabel;
            document.getElementById('login-theme-text').innerText = themeLabel;
            localStorage.setItem('binus_theme', newTheme);
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'id' : 'en';
            document.getElementById('lang-text').innerText = currentLang === 'en' ? 'ENG' : 'ID';
            document.getElementById('login-lang-text').innerText = currentLang === 'en' ? 'ENG' : 'ID';
            
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const themeLabel = currentTheme === 'dark' ? tk('theme_dark') : tk('theme_light');
            document.getElementById('theme-text').innerText = themeLabel;
            document.getElementById('login-theme-text').innerText = themeLabel;
            localStorage.setItem('binus_lang', currentLang);
        }

        // Routing Navigasi Faux (Karena masih coming soon, cukup ubah status active di tab)
        function navigate(viewId) {
            ['dashboard', 'periode', 'input', 'selisih', 'settings'].forEach(id => {
                const nav = document.getElementById('nav-' + id);
                if (nav) nav.classList.remove('active');
            });
            const navBtn = document.getElementById('nav-' + viewId);
            if (navBtn) navBtn.classList.add('active');
        }

        // Init
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('binus_theme');
            if (savedTheme) { document.documentElement.setAttribute('data-theme', savedTheme); document.documentElement.style.colorScheme = savedTheme; } 
            else { document.documentElement.style.colorScheme = 'dark'; }

            const savedLang = localStorage.getItem('binus_lang'); if (savedLang) currentLang = savedLang;

            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const themeLabel = currentTheme === 'dark' ? tk('theme_dark') : tk('theme_light');
            document.getElementById('theme-text').innerText = themeLabel; document.getElementById('login-theme-text').innerText = themeLabel;
            document.getElementById('lang-text').innerText = currentLang === 'en' ? 'ENG' : 'ID'; document.getElementById('login-lang-text').innerText = currentLang === 'en' ? 'ENG' : 'ID';

            try {
                const saved = localStorage.getItem('binus_current_session');
                if (saved && saved !== "undefined") {
                    const u = JSON.parse(saved);
                    if (u && u.role) { applyRole(u); }
                }
            } catch (e) { localStorage.removeItem('binus_current_session'); }
        });
    </script>
</body>
</html>
